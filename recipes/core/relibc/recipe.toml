[source]
# git = "https://gitlab.redox-os.org/redox-os/relibc.git"
git = "https://gitlab.redox-os.org/njskalski/relibc.git"
branch = "fix_clang_bindgen_issue"

[build]
template = "custom"
script = """
"${COOKBOOK_MAKE}" \
    -C "${COOKBOOK_SOURCE}" \
    -j"$($NPROC)" \
    CARGO="env -u CARGO cargo" \
    DESTDIR="${COOKBOOK_STAGE}" \
    install
"""
