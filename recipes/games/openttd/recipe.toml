[source]
git = "https://github.com/OpenTTD/OpenTTD.git"
branch = "release/1.8"
patches = ["redox.patch"]

[build]
template = "custom"
dependencies = [
    "freetype2",
    "liborbital",
    "libpng",
    "sdl1",
    "xz",
    "zlib",
]
script = """
cd "${COOKBOOK_SOURCE}"

# Old recipe used a build environment variable which doesn't seem to be available in new format
# We'll use gcc -dumpmachine and hope it's not an issue
./configure \
    --build="$(gcc -dumpmachine)" \
    --host="${TARGET}" \
    --prefix="" \
    --enable-static \
    --without-liblzo2 \
    --disable-network \
    --without-threads

make VERBOSE=1 -j"$(nproc)"

dest="${COOKBOOK_STAGE}"
bundledir="$dest/bundle"

make VERBOSE=1 ROOT_DIR="${COOKBOOK_SOURCE}/" BUNDLE_DIR="$bundledir" INSTALL_DIR="$dest/usr" install
rm -rf "$bundledir"

if [ -d "${COOKBOOK_STAGE}/usr/bin" ]
then
    find "${COOKBOOK_STAGE}/usr/bin" -type f -exec "${TARGET}-strip" -v {} ';'
fi
"""