[source]
# git = "https://github.com/servo/servo"
# sha = "f19b2f6e848ad2b4b5fde8969958e37e76844faa"
# patches = [
    # "full-cargo-toml.patch",
# ]
git = "https://gitlab.redox-os.org/njskalski/servo.git"
rev = "cfabd397cabfc55bf166430e82d7b7a404d7127f" # for some reason I have to point to exact SHA, because just naming branch doesn't work.

#
#

[build]
template = "custom"
dependencies = [
    "freetype2",
    "gettext",
    "glib",
    "gstreamer",
    "harfbuzz",
    "libffi",
    "libiconv",
    "libx11",
    "libxcb",
    "libpng",
    "openssl1",
    "pcre",
    "zlib",

    "x11proto",
    "x11proto-kb",
    "xcb-proto",
    "xextproto",
    "libxau",
    "libpthread-stubs",
    "fontconfig",
    "expat",
]
script = """
cp "${COOKBOOK_RECIPE}/.servobuild" "${COOKBOOK_SOURCE}/.servobuild"

# Add wrapper to PATH
export PATH="${COOKBOOK_RECIPE}:${PATH}"
export HOST=x86_64-unknown-linux-gnu
export TARGET=x86_64-unknown-redox

# Force cargo to use the correct build target
export CARGO_BUILD_TARGET=x86_64-unknown-redox

# Set up cross-compilation environment for cargo and C dependencies
export CC_x86_64_unknown_redox=x86_64-unknown-redox-gcc
export CXX_x86_64_unknown_redox=x86_64-unknown-redox-g++
export AR_x86_64_unknown_redox=x86_64-unknown-redox-ar
export AS_x86_64_unknown_redox=x86_64-unknown-redox-as
export CARGO_TARGET_X86_64_UNKNOWN_REDOX_LINKER=x86_64-unknown-redox-gcc

# Also set CC for the default target
# export CC=x86_64-unknown-redox-gcc
# export CXX=x86_64-unknown-redox-g++
# export AR=x86_64-unknown-redox-ar
# export AS=x86_64-unknown-redox-as


# jemalloc specific configuration
export JEMALLOC_SYS_WITH_LG_PAGE=16
export TARGET_CC=x86_64-unknown-redox-gcc
export TARGET_CXX=x86_64-unknown-redox-g++
export TARGET_AR=x86_64-unknown-redox-ar

export PKG_CONFIG_ALLOW_CROSS=1

#EXPAT_NO_PKG_CONFIG=1 FREETYPE2_NO_PKG_CONFIG=1 FONTCONFIG_NO_PKG_CONFIG=1
#TOOLCHAIN_PREFIX="${PWD}/toolchain/cctools/bin/x86_64-apple-darwin10-" \
#CMAKE_TOOLCHAIN_FILE="${PWD}/cmake-toolchain"

# this /usr/share/pkgconfig comes from x11proto, that stages pc files in wrong dir.
export PKG_CONFIG_PATH="${COOKBOOK_SYSROOT}/lib/pkgconfig"
#:${COOKBOOK_SYSROOT}/usr/lib/pkgconfig:${COOKBOOK_SYSROOT}/usr/share/pkgconfig"
export PKG_CONFIG_LIBDIR="${COOKBOOK_SYSROOT}/lib/pkgconfig"
#:${COOKBOOK_SYSROOT}/usr/lib/pkgconfig"
export PKG_CONFIG_SYSROOT_DIR="${COOKBOOK_SYSROOT}"

rsync -a --delete "${COOKBOOK_SOURCE}/" ./

# # Configure cargo for Redox target
# cat >> .cargo/config.toml << EOF

# [target.x86_64-unknown-redox]
# linker = "x86_64-unknown-redox-gcc"
# ar = "x86_64-unknown-redox-ar"

# [build]
# target = "x86_64-unknown-redox"
# EOF

# ./mach build -v

# I'm tired trying figure out why multiple pkgconfig paths are ignored by cargo building stuff
# cp ${COOKBOOK_SYSROOT}/usr/share/pkgconfig/*.pc ${COOKBOOK_SYSROOT}/lib/pkgconfig -v || true
# cp ${COOKBOOK_SYSROOT}/usr/lib/pkgconfig/*.pc ${COOKBOOK_SYSROOT}/lib/pkgconfig -v || true
rsync -a -v ${COOKBOOK_SYSROOT}/usr/share/pkgconfig/*.pc ${COOKBOOK_SYSROOT}/lib/pkgconfig/
rsync -a -v ${COOKBOOK_SYSROOT}/usr/lib/pkgconfig/*.pc ${COOKBOOK_SYSROOT}/lib/pkgconfig/

# ls /mnt/redox/cookbook/recipes/wip/web/servo/target/x86_64-unknown-redox/sysroot/lib/pkgconfig | grep x11
# ls /mnt/redox/cookbook/recipes/wip/web/servo/target/x86_64-unknown-redox/sysroot/usr/lib/pkgconfig | grep x11
ls -al /mnt/redox/cookbook/recipes/wip/web/servo/target/x86_64-unknown-redox/sysroot/lib/pkgconfig

# -j 1 to lock down "which crate fails", because cargo tree -i doesn't work for gaol
cargo build --target x86_64-unknown-redox

"""
