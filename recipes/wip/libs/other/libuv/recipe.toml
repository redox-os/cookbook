#TODO missing headers such as 'net/if.h' or 'sys/statfs.h'
[source]
tar = "https://dist.libuv.org/dist/v1.45.0/libuv-v1.45.0.tar.gz"
[build]
dependencies = [
    "relibc"
]
template = "custom"
script = """
mkdir -p ${COOKBOOK_SYSROOT}/include/net
mkdir -p ${COOKBOOK_SYSROOT}/include/sys
cp ${COOKBOOK_RECIPE}/if.h ${COOKBOOK_SYSROOT}/include/net/
cp ${COOKBOOK_RECIPE}/statfs.h ${COOKBOOK_SYSROOT}/include/sys/
COOKBOOK_CONFIGURE="cmake"
COOKBOOK_CONFIGURE_FLAGS=(
    -DCMAKE_BUILD_TYPE=Release
    -DCMAKE_CROSSCOMPILING=True
    -DCMAKE_EXE_LINKER_FLAGS="-static"
    -DCMAKE_INSTALL_PREFIX="/"
    -DCMAKE_PREFIX_PATH="${COOKBOOK_SYSROOT}"
    -DCMAKE_SYSTEM_NAME=Generic
    -DCMAKE_SYSTEM_PROCESSOR="$(echo "${TARGET}" | cut -d - -f1)"
    -DCMAKE_VERBOSE_MAKEFILE=On
"${COOKBOOK_SOURCE}"
)
cookbook_configure
"""
