#TODO missing cross compile flags/env vars
[source]
tar = "https://www.leonerd.org.uk/code/libtermkey/libtermkey-0.22.tar.gz"
[build]
dependencies = [
    "ncurses"
]
template = "custom"
# don't need to build the demo
script = """
rsync -av --delete "${COOKBOOK_SOURCE}/" ./
touch demo demo-async
make CFLAGS="-static -D_POSIX_VDISABLE=1 -I${COOKBOOK_SYSROOT}/include -I${COOKBOOK_SYSROOT}/include/ncurses" PREFIX=${COOKBOOK_STAGE} -o demo -o demo-async && make install PREFIX=${COOKBOOK_STAGE}
"""
