#TODO missing cross compile flags/env vars
[source]
tar = "https://www.leonerd.org.uk/code/libtickit/libtickit-0.4.3.tar.gz"
[build]
dependencies = [
    "libtermkey",
    "libncurses"
]
template = "custom"
script = """
rsync -av --delete "${COOKBOOK_SOURCE}/" ./
make CFLAGS="-static -I${COOKBOOK_SYSROOT}/include" PREFIX=${COOKBOOK_STAGE} && make install PREFIX=${COOKBOOK_STAGE}
"""
